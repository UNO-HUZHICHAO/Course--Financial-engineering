<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1400" width="1600" height="1400" style="background-color: #FFFFFF; font-family: 'Microsoft YaHei', 'Source Han Sans CN', sans-serif;">
  
  <defs>
    <filter id="shadow-card" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0F172A" flood-opacity="0.05"/>
    </filter>
    
    <filter id="shadow-arrow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.15"/>
    </filter>

    <linearGradient id="grad-core" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B8CFF" />
      <stop offset="100%" stop-color="#52D1C6" />
    </linearGradient>

    <linearGradient id="grad-inter-arrow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#5B9DFF" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#52D1C6" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 9 5 L 0 9 z" fill="#8B8CFF" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#94A3B8" />
    </marker>
  </defs>

  <text x="800" y="55" text-anchor="middle" font-size="32" font-weight="bold" fill="#1E293B" letter-spacing="3">《研究背景、核心问题与技术路线概览》</text>
  <rect x="680" y="75" width="240" height="4" rx="2" fill="#5B9DFF" />

  <rect x="40" y="110" width="1520" height="200" rx="12" fill="#F8FAFC" stroke="#5B9DFF" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 52 110 L 100 110 L 100 310 L 52 310 Q 40 310 40 298 L 40 122 Q 40 110 52 110 Z" fill="#5B9DFF"/>
  <text x="70" y="210" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF" writing-mode="vertical-rl" letter-spacing="5">研究背景</text>

  <g transform="translate(140, 140)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">科创板市场</text>
    <rect x="190" y="58" width="40" height="2.5" fill="#5B9DFF"/>
    <text x="210" y="95" text-anchor="middle" font-size="16" fill="#475569">• 硬科技企业聚集</text>
    <text x="210" y="120" text-anchor="middle" font-size="16" fill="#475569">• 20%涨跌幅限制  • 高研发投入</text>
  </g>

  <path d="M 565 210 L 595 210" stroke="#5B9DFF" stroke-width="4" marker-end="url(#arrow-blue)" />

  <g transform="translate(600, 140)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">量化投资竞争</text>
    <rect x="190" y="58" width="40" height="2.5" fill="#5B9DFF"/>
    <text x="210" y="95" text-anchor="middle" font-size="16" fill="#475569">人工智能驱动的 Alpha 竞争</text>
    <text x="210" y="120" text-anchor="middle" font-size="15" fill="#64748B" font-style="italic">Complex Non-linear Patterns</text>
  </g>

  <path d="M 1025 210 L 1055 210" stroke="#5B9DFF" stroke-width="4" marker-end="url(#arrow-blue)" />

  <g transform="translate(1060, 140)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#1E293B">市场特征</text>
    <rect x="190" y="58" width="40" height="2.5" fill="#5B9DFF"/>
    <text x="210" y="95" text-anchor="middle" font-size="16" fill="#475569">低信噪比（Low SNR）</text>
    <text x="210" y="120" text-anchor="middle" font-size="16" fill="#475569">高特质波动  • 强非平稳性</text>
  </g>

  <polygon points="785,325 815,325 815,350 832,350 800,375 768,350 785,350" fill="url(#grad-inter-arrow)" stroke="#94A3B8" stroke-width="1.5" filter="url(#shadow-arrow)"/>


  <rect x="40" y="390" width="1520" height="200" rx="12" fill="#FFFDF9" stroke="#FFB56B" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 52 390 L 100 390 L 100 590 L 52 590 Q 40 590 40 578 L 40 402 Q 40 390 52 390 Z" fill="#FFB56B"/>
  <text x="70" y="490" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF" writing-mode="vertical-rl" letter-spacing="5">核心痛点</text>

  <g transform="translate(140, 420)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#FFD8B2" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#B45309">图谱噪声问题</text>
    <rect x="190" y="55" width="40" height="2.5" fill="#FFB56B"/>
    <text x="40" y="90" font-size="15" fill="#78350F">• 伪关联边泛滥</text>
    <text x="220" y="90" font-size="15" fill="#78350F">• 信息过平滑</text>
    <text x="40" y="118" font-size="15" fill="#78350F">• 个股差异特征被严重掩盖</text>
  </g>

  <g transform="translate(600, 420)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#FFD8B2" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#B45309">信号频率错配</text>
    <rect x="190" y="55" width="40" height="2.5" fill="#FFB56B"/>
    <text x="210" y="90" text-anchor="middle" font-size="16" fill="#78350F">高频量价信号</text>
    <text x="210" y="114" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFB56B">VS</text>
    <text x="210" y="134" text-anchor="middle" font-size="16" fill="#78350F">低频基本面关系</text>
  </g>

  <g transform="translate(1060, 420)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#FFD8B2" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="42" text-anchor="middle" font-size="20" font-weight="bold" fill="#B45309">误差最大化陷阱</text>
    <rect x="190" y="55" width="40" height="2.5" fill="#FFB56B"/>
    <text x="40" y="90" font-size="15" fill="#78350F">• QP 优化过拟合预测噪声</text>
    <text x="40" y="118" font-size="15" fill="#78350F">• 极端集中持仓导致样本外失效</text>
  </g>

  <polygon points="785,605 815,605 815,630 832,630 800,655 768,630 785,630" fill="url(#grad-inter-arrow)" stroke="#94A3B8" stroke-width="1.5" filter="url(#shadow-arrow)"/>


  <rect x="40" y="670" width="1520" height="400" rx="12" fill="#FAFEFB" stroke="#52D1C6" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 52 670 L 100 670 L 100 1070 L 52 1070 Q 40 1070 40 1058 L 40 682 Q 40 670 52 670 Z" fill="#52D1C6"/>
  <text x="70" y="870" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF" writing-mode="vertical-rl" letter-spacing="5">研究方案</text>

  <g transform="translate(160, 695)">
    <rect width="280" height="54" rx="6" fill="#FFFFFF" stroke="#5B9DFF" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="140" y="33" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E293B">高频量价特征 (Time-Series)</text>
    
    <path d="M 140 54 L 140 84" stroke="#5B9DFF" stroke-width="3" marker-end="url(#arrow-blue)"/>
    
    <rect y="84" width="280" height="54" rx="6" fill="#FFFFFF" stroke="#5B9DFF" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="140" y="117" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E293B">LSTM 网络 (时序提取)</text>
    
    <path d="M 140 138 L 140 168" stroke="#5B9DFF" stroke-width="3" marker-end="url(#arrow-blue)"/>
    
    <rect y="168" width="280" height="54" rx="27" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
    <text x="140" y="201" text-anchor="middle" font-size="16" font-weight="bold" fill="#0369A1">微观动量信号</text>
  </g>

  <g transform="translate(1160, 695)">
    <rect width="280" height="54" rx="6" fill="#FFFFFF" stroke="#52D1C6" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="140" y="33" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E293B">产业链关系图谱 (Graph)</text>
    
    <path d="M 140 54 L 140 84" stroke="#52D1C6" stroke-width="3" marker-end="url(#arrow-green)"/>
    
    <rect y="84" width="280" height="54" rx="6" fill="#FFFFFF" stroke="#52D1C6" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="140" y="117" text-anchor="middle" font-size="15" font-weight="bold" fill="#1E293B">GAT 图注意力网络</text>
    
    <path d="M 140 138 L 140 168" stroke="#52D1C6" stroke-width="3" marker-end="url(#arrow-green)"/>
    
    <rect y="168" width="280" height="54" rx="27" fill="#CCFBF1" stroke="#2DD4BF" stroke-width="1.5"/>
    <text x="140" y="201" text-anchor="middle" font-size="16" font-weight="bold" fill="#0F766E">产业溢出信号</text>
  </g>

  <path d="M 440 878 L 565 878" stroke="#5B9DFF" stroke-width="4" marker-end="url(#arrow-blue)"/>
  <path d="M 1160 878 L 1035 878" stroke="#52D1C6" stroke-width="4" marker-end="url(#arrow-green)"/>

  <g transform="translate(580, 825)">
    <rect width="440" height="106" rx="53" fill="url(#grad-core)" filter="url(#shadow-arrow)"/>
    <rect x="6" y="6" width="428" height="94" rx="47" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.6"/>
    <text x="220" y="46" text-anchor="middle" font-size="20" font-weight="bold" fill="#FFFFFF" letter-spacing="1">Adaptive FiLM 桥接架构</text>
    <text x="220" y="74" text-anchor="middle" font-size="14" fill="#F8FAFC">自适应特征调制：图谱信息动态调节时序特征</text>
  </g>

  <path d="M 800 931 L 800 964" stroke="#8B8CFF" stroke-width="4" marker-end="url(#arrow-purple)"/>

  <g transform="translate(300, 965)">
    <rect width="1000" height="66" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2" filter="url(#shadow-card)"/>
    
    <text x="100" y="39" text-anchor="middle" font-size="18" font-weight="bold" fill="#475569">融合输出：</text>
    
    <rect x="180" y="13" width="180" height="40" rx="20" fill="#EFF6FF" stroke="#5B9DFF" stroke-width="1.5"/>
    <text x="270" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#1E3A8A">Alpha 预测信号</text>
    
    <path d="M 360 33 L 415 33" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow-gray)"/>
    
    <rect x="430" y="13" width="210" height="40" rx="20" fill="#F0FDF4" stroke="#52D1C6" stroke-width="1.5"/>
    <text x="535" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#065F46">分层等权组合构建</text>
    
    <path d="M 640 33 L 695 33" stroke="#94A3B8" stroke-width="3" marker-end="url(#arrow-gray)"/>
    
    <rect x="710" y="13" width="180" height="40" rx="20" fill="#F8FAFC" stroke="#8B8CFF" stroke-width="1.5"/>
    <text x="800" y="38" text-anchor="middle" font-size="16" font-weight="bold" fill="#3730A3">指数增强策略</text>
  </g>

  <polygon points="785,1085 815,1085 815,1110 832,1110 800,1135 768,1110 785,1110" fill="url(#grad-inter-arrow)" stroke="#94A3B8" stroke-width="1.5" filter="url(#shadow-arrow)"/>


  <rect x="40" y="1150" width="1520" height="200" rx="12" fill="#F8FAFC" stroke="#8B8CFF" stroke-width="2" stroke-dasharray="6 4"/>
  <path d="M 52 1150 L 100 1150 L 100 1350 L 52 1350 Q 40 1350 40 1338 L 40 1162 Q 40 1150 52 1150 Z" fill="#8B8CFF"/>
  <text x="70" y="1250" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF" writing-mode="vertical-rl" letter-spacing="5">主要贡献</text>

  <g transform="translate(140, 1180)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#0F766E">图谱去噪机制</text>
    <rect x="190" y="58" width="40" height="2.5" fill="#52D1C6"/>
    <text x="210" y="102" text-anchor="middle" font-size="16" fill="#475569">剔除行业冗余边</text>
    <text x="210" y="126" text-anchor="middle" font-size="16" fill="#475569">有效提升横截面特征区分能力</text>
  </g>

  <g transform="translate(600, 1180)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#4338CA">Adaptive FiLM 融合</text>
    <rect x="190" y="58" width="40" height="2.5" fill="#8B8CFF"/>
    <text x="210" y="102" text-anchor="middle" font-size="16" fill="#475569">自适应解决异步信号冲突</text>
    <text x="210" y="126" text-anchor="middle" font-size="16" fill="#475569">实现多源快慢信息高效协同</text>
  </g>

  <g transform="translate(1060, 1180)">
    <rect width="420" height="140" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow-card)"/>
    <text x="210" y="45" text-anchor="middle" font-size="20" font-weight="bold" fill="#1D4ED8">鲁棒资产配置</text>
    <rect x="190" y="58" width="40" height="2.5" fill="#5B9DFF"/>
    <text x="210" y="102" text-anchor="middle" font-size="16" fill="#475569">分层等权架构显著优于传统 QP 优化</text>
    <text x="210" y="126" text-anchor="middle" font-size="16" fill="#475569">全面提升策略样本外 Alpha 表现</text>
  </g>

</svg>
